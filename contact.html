    <title>ITI Hajin | Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {
            font-family: "Roboto";
            background-color: rgb(220, 239, 253)
        }

        #navbar {
            background-color: white;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            box-shadow: 0px 5px 10px #8e8b8b;
            position: sticky;
            top: 5px;
            -webkit-user-select: none;
            user-select: none;
            z-index: 2;

        }

        #navbar ul {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            gap: 5px;
            list-style: none;



            li a {
                display: block;
                color: black;
                font-size: small;
                text-decoration: none;
                font-weight: bold;
                text-transform: uppercase;
                padding: 5px;
                border-radius: 10px;
                transition: all 0.3s ease;
                position: relative;
            }
        }

        #navbar ul li a:hover {
            transform: scale(1.05);
        }

        #navbar ul li a:active {
            transform: scale(0.9);
        }

        #navbar ul li a::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0px;
            height: 5px;
            background-color: green;
            transition: all 0.3s ease;
            border-radius: 5px;

        }

        #navbar ul li a:hover::after {
            width: 100%;
            transform: translateX(-50%);

        }

        .container {
            margin: 10px;
            background: rgb(238, 236, 238);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgb(17, 36, 7);
            display: flex;
            flex-direction: column;
            gap: 20px;

            h3 {
                text-transform: uppercase;
                background-color: rgb(202, 202, 202);
                padding: 10px;
                text-align: center;
                width: 99%;
                border-radius: 10px;
            }

            div {
                display: flex;
                height: 20px;
                gap: 10px;
                color: black;

                i {
                    font-size: 1rem;
                }

                a {
                    text-decoration: none;
                    color: black;
                }

            }

        }

        #copyright {
            background-color: #fff;
            width: 95%;
            margin: 5px auto;
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 12px;
            background-color: rgb(193, 193, 193);
            padding: 10px;
            border-radius: 5px;

        }

        #map {
            height: fit-content;
            display: flex;
            flex-direction: column;
            align-items: center;

            h3 {
                text-transform: uppercase;
                background-color: rgb(202, 202, 202);
                padding: 10px;
                text-align: center;
                width: 99%;
                border-radius: 10px;

            }

            iframe {
                border: none;
                border-radius: 10px;
            }

        }



        #copyright div {
            text-align: center;
        }
    </style>
